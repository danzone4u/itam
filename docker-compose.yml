
services:
  itam-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: itam-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=@Lantai2Jag88
    ports:
      - "1433:1433"
    volumes:
      - itam-sql-data:/var/opt/mssql
      - itam-backups:/var/opt/mssql/backups
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P @Lantai2Jag88 -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  itam-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itam-webapp
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=itam-db;Database=itamDB;User Id=sa;Password=@Lantai2Jag88;TrustServerCertificate=True;MultipleActiveResultSets=true
    depends_on:
      itam-db:
        condition: service_healthy
    volumes:
      - itam-uploads:/app/wwwroot/uploads
      - itam-backups:/var/opt/mssql/backups

volumes:
  itam-sql-data:
  itam-uploads:
  itam-backups:
